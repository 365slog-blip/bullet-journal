<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#5c3d2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Bullet">
  <link rel="manifest" href="manifest.json">
  <title>Bullet Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══ GOOGLE LOGIN SCREEN ══ -->
<div id="screen-google" class="auth-screen">
  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="brand-mark">✦</div>
      <h1 class="brand-name">Bullet</h1>
      <p class="brand-sub">나만의 불렛저널</p>
    </div>
    <div class="google-area">
      <button class="google-btn" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.34-8.16 2.34-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google로 로그인
      </button>
      <p class="google-note" id="google-note">데이터 저장을 위해 Google 계정이 필요합니다</p>
    </div>
    <p class="auth-ver">v1.5.0</p>
  </div>
</div>

<!-- ══ PIN SCREEN ══ -->
<div id="screen-pin" class="auth-screen hidden">
  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="brand-mark">✦</div>
      <h1 class="brand-name">Bullet</h1>
    </div>
    <div class="pin-dots" id="pin-dots">
      <span class="pdot" id="pdot-0"></span>
      <span class="pdot" id="pdot-1"></span>
      <span class="pdot" id="pdot-2"></span>
      <span class="pdot" id="pdot-3"></span>
    </div>
    <p class="pin-msg" id="pin-msg">PIN을 입력하세요</p>
    <div class="pin-pad">
      <button class="pkey" data-k="1">1</button>
      <button class="pkey" data-k="2">2</button>
      <button class="pkey" data-k="3">3</button>
      <button class="pkey" data-k="4">4</button>
      <button class="pkey" data-k="5">5</button>
      <button class="pkey" data-k="6">6</button>
      <button class="pkey" data-k="7">7</button>
      <button class="pkey" data-k="8">8</button>
      <button class="pkey" data-k="9">9</button>
      <span class="pkey-blank"></span>
      <button class="pkey" data-k="0">0</button>
      <button class="pkey pkey-del" id="pkey-del">⌫</button>
    </div>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div id="app" class="hidden">

  <!-- Top Nav -->
  <header class="top-nav">
    <div class="nav-left">
      <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </button>
      <span class="nav-logo">✦ Bullet</span>
    </div>
    <nav class="nav-tabs" id="nav-tabs">
      <button class="ntab active" data-tab="home">메인</button>
      <button class="ntab" data-tab="diary">다이어리</button>
      <button class="ntab" data-tab="project">프로젝트</button>
      <button class="ntab" data-tab="language">언어</button>
      <button class="ntab" data-tab="writing">글쓰기</button>
      <button class="ntab" data-tab="stats">월간통계</button>
      <button class="ntab" data-tab="subs">구독관리</button>
    </nav>
    <div class="nav-right">
      <button class="icon-btn" id="theme-btn" title="테마 전환">◐</button>
      <button class="icon-btn" id="refresh-btn" title="잠금">↻</button>
    </div>
  </header>

  <!-- Mobile Drawer -->
  <div id="drawer-overlay" class="drawer-overlay"></div>
  <nav id="drawer" class="drawer">
    <div class="drawer-head">
      <span class="nav-logo">✦ Bullet</span>
      <button class="icon-btn" id="drawer-close">✕</button>
    </div>
    <div class="drawer-body">
      <button class="drawer-item active" data-tab="home">🏠 메인</button>
      <button class="drawer-item" data-tab="diary">📖 다이어리</button>
      <button class="drawer-item" data-tab="project">🗂 프로젝트</button>
      <button class="drawer-item" data-tab="language">🌐 언어</button>
      <button class="drawer-item" data-tab="writing">✏️ 글쓰기</button>
      <button class="drawer-item" data-tab="stats">📊 월간통계</button>
      <button class="drawer-item" data-tab="subs">💳 구독관리</button>
    </div>
  </nav>

  <!-- Pull-to-Refresh Indicator -->
  <div id="ptr-indicator" class="ptr-indicator">
    <span class="ptr-text">↓ 당겨서 새로고침</span>
  </div>

  <!-- Main Content -->
  <main id="main-content">

    <!-- HOME TAB -->
    <div class="tab-pane active" id="tab-home">
      <div class="home-date-hero" id="home-date-hero"></div>
      <div class="home-layout">

        <!-- Top row: Calendar + Routine -->
        <div class="home-top">
          <div class="home-left">
            <div class="cal-head">
              <button class="cal-nav" id="cal-prev">‹</button>
              <span class="cal-month-label" id="cal-month-label"></span>
              <button class="cal-nav" id="cal-next">›</button>
            </div>
            <div class="cal-dow">
              <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
            <div class="cal-event-panel" id="cal-event-panel"></div>
          </div>
          <div class="home-routine">
            <section class="h-section">
              <div class="h-sec-head">
                <h3 class="h-sec-title">Daily Routine</h3>
                <button class="h-sec-action" id="routine-settings-btn">관리</button>
              </div>
              <div id="routine-list"></div>
            </section>
          </div>
        </div>

        <!-- Bottom row: Weekly | Deep | Non-Deep -->
        <div class="home-bottom">
          <section class="h-section">
            <div class="h-sec-head">
              <h3 class="h-sec-title">Weekly Goal</h3>
              <span class="week-range-label" id="week-range-label"></span>
            </div>
            <div id="weekly-list"></div>
            <input class="inline-add-input" id="weekly-add" placeholder="+ 목표를 입력하고 Enter">
          </section>
          <section class="h-section">
            <div class="h-sec-head">
              <h3 class="h-sec-title">To-Do <span class="badge deep">Deep</span></h3>
            </div>
            <div id="todo-deep-list"></div>
            <input class="inline-add-input" id="todo-deep-add" placeholder="+ 할 일을 입력하고 Enter">
          </section>
          <section class="h-section">
            <div class="h-sec-head">
              <h3 class="h-sec-title">To-Do <span class="badge non">Non-Deep</span></h3>
            </div>
            <div id="todo-non-list"></div>
            <input class="inline-add-input" id="todo-non-add" placeholder="+ 할 일을 입력하고 Enter">
          </section>
        </div>
      </div>
    </div>

    <!-- DIARY TAB -->
    <div class="tab-pane hidden" id="tab-diary">
      <div class="diary-wrap">
        <div class="diary-top">
          <div class="diary-mini-wrap">
            <div class="diary-mini-head">
              <button class="cal-nav" id="dcal-prev">‹</button>
              <span id="dcal-label"></span>
              <button class="cal-nav" id="dcal-next">›</button>
            </div>
            <div class="diary-mini-dow">
              <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
            </div>
            <div class="diary-mini-grid" id="diary-mini-grid"></div>
          </div>
          <section class="h-section diary-goals-section">
            <div class="h-sec-head">
              <h3 class="h-sec-title">Weekly Goal</h3>
              <span class="week-range-label" id="diary-week-range-label"></span>
            </div>
            <div id="diary-weekly-list"></div>
            <input class="inline-add-input" id="diary-weekly-add" placeholder="+ 목표를 입력하고 Enter">
          </section>
        </div>
        <div class="diary-week-grid" id="diary-week-grid"></div>
      </div>
    </div>

    <!-- PROJECT TAB -->
    <div class="tab-pane hidden" id="tab-project">
      <div id="project-gallery-view">
        <div class="tab-toolbar">
          <h2 class="tab-page-h">프로젝트</h2>
          <button class="btn-primary" id="add-project-btn">+ 새 프로젝트</button>
        </div>
        <div class="project-grid" id="project-grid"></div>
      </div>
      <div id="project-detail-view" class="hidden">
        <div class="tab-toolbar">
          <button class="back-btn" id="project-back">← 목록</button>
          <button class="btn-danger-sm" id="proj-del-btn">삭제</button>
        </div>
        <div id="project-detail-body"></div>
      </div>
    </div>

    <!-- LANGUAGE TAB -->
    <div class="tab-pane hidden" id="tab-language">
      <div class="lang-wrap">
        <div class="lang-top">
          <div class="lang-sel" id="lang-sel">
            <button class="lang-btn active" data-lang="일본어">🇯🇵 일본어</button>
            <button class="lang-btn" data-lang="영어">🇺🇸 영어</button>
          </div>
          <div class="lang-subtabs" id="lang-subtabs">
            <button class="lstab active" data-sub="words">단어장</button>
            <button class="lstab" data-sub="grammar">문법노트</button>
            <button class="lstab" data-sub="phrases">회화표현</button>
            <button class="lstab" data-sub="duolingo">듀오링고</button>
          </div>
        </div>
        <div id="lang-body"></div>
      </div>
    </div>

    <!-- WRITING TAB -->
    <div class="tab-pane hidden" id="tab-writing">
      <div id="writing-gallery-view">
        <div class="tab-toolbar writing-toolbar">
          <div class="cat-chips" id="writing-cat-chips">
            <button class="cat-chip active" data-cat="전체">전체</button>
            <button class="cat-chip" data-cat="독서">독서</button>
            <button class="cat-chip" data-cat="영화">영화</button>
            <button class="cat-chip" data-cat="드라마">드라마</button>
            <button class="cat-chip" data-cat="웹툰웹소설">웹툰/웹소설</button>
          </div>
          <button class="btn-primary" id="add-writing-btn">+ 글쓰기</button>
        </div>
        <div class="writing-grid" id="writing-grid"></div>
      </div>
      <div id="writing-form-view" class="hidden">
        <div class="tab-toolbar">
          <button class="back-btn" id="writing-form-back">← 목록</button>
          <h2 class="tab-page-h" id="writing-form-title">새 글쓰기</h2>
        </div>
        <div class="form-wrap" id="writing-form-body"></div>
      </div>
      <div id="writing-detail-view" class="hidden">
        <div class="tab-toolbar">
          <button class="back-btn" id="writing-detail-back">← 목록</button>
          <div class="flex-row gap8">
            <button class="btn-outline-sm" id="writing-edit-btn">수정</button>
            <button class="btn-danger-sm" id="writing-delete-btn">삭제</button>
          </div>
        </div>
        <div id="writing-detail-body"></div>
      </div>
    </div>

    <!-- SUBS TAB -->
    <div class="tab-pane hidden" id="tab-subs">
      <div class="subs-wrap">
        <div id="subs-summary"></div>
        <div id="subs-upcoming"></div>
        <div id="subs-list-section"></div>
      </div>
    </div>

    <!-- STATS TAB -->
    <div class="tab-pane hidden" id="tab-stats">
      <div class="stats-wrap">
        <div class="stats-head">
          <button class="cal-nav" id="stats-prev">‹</button>
          <span class="cal-month-label" id="stats-label"></span>
          <button class="cal-nav" id="stats-next">›</button>
        </div>
        <div id="stats-body"></div>
      </div>
    </div>

  </main>
</div>

<!-- ══ ROUTINE SETTINGS MODAL ══ -->
<div id="routine-modal" class="overlay hidden">
  <div class="modal-box">
    <div class="modal-head">
      <h3>루틴 관리</h3>
      <button class="icon-btn" id="routine-modal-close">✕</button>
    </div>
    <div class="modal-body" id="routine-modal-body"></div>
    <div class="modal-foot">
      <div style="display:flex;flex-direction:column;gap:8px">
        <input class="form-input" id="routine-add-name" placeholder="루틴 이름 *">
        <select class="form-input" id="routine-add-type">
          <option value="checkbox">☑ 체크박스 (일반)</option>
          <option value="weight">⚖ 몸무게 (숫자)</option>
          <option value="meal">🍽 식사 (텍스트)</option>
        </select>
        <button class="btn-primary" id="routine-add-save">추가</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ CONFIRM DIALOG ══ -->
<div id="confirm-overlay" class="overlay hidden">
  <div class="confirm-box">
    <p id="confirm-msg" class="confirm-text"></p>
    <div class="confirm-btns">
      <button class="btn-outline" id="confirm-no">취소</button>
      <button class="btn-danger" id="confirm-yes">삭제</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div id="toast-wrap"></div>

<!-- ══ LOADING ══ -->
<div id="loading-overlay" class="hidden">
  <div class="spinner"></div>
</div>

<script src="auth.js" defer></script>
<script src="sheets.js" defer></script>
<script src="main.js" defer></script>
</body>
</html>
